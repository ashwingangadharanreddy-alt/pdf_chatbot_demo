# Render service definitions for backend and frontend
# Adjust env values in the Render dashboard (secrets) after deploy.

services:
  - type: web
    name: document-rag-backend
    env: python
    root: backend
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: QDRANT_URL
      - key: QDRANT_API_KEY
      - key: GOOGLE_API_KEY
    diskMounts:
      - mountPath: /opt/render/project/backend/uploads
        name: backend-data

  - type: web
    name: document-rag-frontend
    env: python
    root: frontend
    branch: main
    buildCommand: pip install -r ../backend/requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true
    envVars:
      - key: BACKEND_URL

persistentDisks:
  - name: backend-data
    sizeGB: 10
