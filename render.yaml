# Render service definitions for backend and frontend
# Adjust env values in the Render dashboard (secrets) after deploy.

services:
  - type: web
    name: document-rag
    env: python
    root: .
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    autoDeploy: true
    envVars:
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: QDRANT_URL
      - key: QDRANT_API_KEY
      - key: GOOGLE_API_KEY
      - key: BACKEND_URL
